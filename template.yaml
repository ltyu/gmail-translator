AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Gmail English-to-Chinese translator using Claude

Globals:
  Function:
    Timeout: 120
    Runtime: nodejs20.x
    MemorySize: 512

Parameters:
  AnthropicApiKeyParam:
    Type: String
    Description: Anthropic API key for Claude
    NoEcho: true
  GmailClientIdParam:
    Type: String
    Description: Gmail OAuth2 client ID
    NoEcho: true
  GmailClientSecretParam:
    Type: String
    Description: Gmail OAuth2 client secret
    NoEcho: true
  AppSecretsSsmPrefixParam:
    Type: String
    Description: SSM prefix for app-level secrets
    Default: /gmail-translator
  ResourceNamePrefixParam:
    Type: String
    Description: Prefix used for named AWS resources in this stack
    Default: gmail-translator
  GmailConnectionSuccessRedirectUrlParam:
    Type: String
    Description: OAuth success redirect URL for future callback handlers
    Default: https://example.com/settings/integrations/gmail/success
  GmailConnectionFailureRedirectUrlParam:
    Type: String
    Description: OAuth failure redirect URL for future callback handlers
    Default: https://example.com/settings/integrations/gmail/error
  Auth0IssuerParam:
    Type: String
    Description: Auth0 issuer URL (e.g. https://YOUR_DOMAIN.auth0.com/). Find this in Auth0 dashboard under Applications > APIs > your API > Settings.
  Auth0AudienceParam:
    Type: String
    Description: Auth0 API audience identifier (e.g. https://gmail-translator-api). Set when creating the API in the Auth0 dashboard.

Resources:
  GmailTranslatorHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:3000
        AllowHeaders:
          - authorization
          - content-type
        AllowMethods:
          - GET
          - OPTIONS
      Auth:
        DefaultAuthorizer: Auth0JwtAuthorizer
        Authorizers:
          Auth0JwtAuthorizer:
            JwtConfiguration:
              issuer: !Ref Auth0IssuerParam
              audience:
                - !Ref Auth0AudienceParam
            IdentitySource: $request.header.Authorization

  TranslatedEmailsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ResourceNamePrefixParam}-translated-emails
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email_id
          AttributeType: S
      KeySchema:
        - AttributeName: email_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  GmailConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ResourceNamePrefixParam}-user-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  GoogleOAuthStatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${ResourceNamePrefixParam}-google-oauth-states
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: state
          AttributeType: S
      KeySchema:
        - AttributeName: state
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  GmailRefreshTokenKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encrypt per-user Gmail refresh tokens stored in DynamoDB
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowRootAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: "kms:*"
            Resource: "*"

  GmailRefreshTokenKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${ResourceNamePrefixParam}-refresh-token
      TargetKeyId: !Ref GmailRefreshTokenKey

  AnthropicApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${AppSecretsSsmPrefixParam}/anthropic-api-key
      Type: SecureString
      Value: !Ref AnthropicApiKeyParam

  GmailClientId:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${AppSecretsSsmPrefixParam}/gmail-client-id
      Type: SecureString
      Value: !Ref GmailClientIdParam

  GmailClientSecret:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub ${AppSecretsSsmPrefixParam}/gmail-client-secret
      Type: SecureString
      Value: !Ref GmailClientSecretParam

  TranslatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref ResourceNamePrefixParam
      CodeUri: ./
      Handler: handler.handler
      Environment:
        Variables:
          PROCESSED_EMAILS_TABLE: !Ref TranslatedEmailsTable
          APP_SECRETS_SSM_PREFIX: !Ref AppSecretsSsmPrefixParam
          GMAIL_CONNECTIONS_TABLE: !Ref GmailConnectionsTable
          GMAIL_CONNECTIONS_STATUS_INDEX: gsi1
          GMAIL_TOKEN_KMS_KEY_ID: !Ref GmailRefreshTokenKey
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt TranslatedEmailsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${GmailConnectionsTable}/index/gsi1
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt GmailConnectionsTable.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/anthropic-api-key
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/gmail-client-id
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/gmail-client-secret
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt GmailRefreshTokenKey.Arn
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handler.ts
        External:
          - "@aws-sdk/*"

  StartGoogleOAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ResourceNamePrefixParam}-start-google-oauth
      CodeUri: ./
      Handler: startGoogleOAuth.handler
      Environment:
        Variables:
          APP_SECRETS_SSM_PREFIX: !Ref AppSecretsSsmPrefixParam
          GOOGLE_OAUTH_STATES_TABLE: !Ref GoogleOAuthStatesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt GoogleOAuthStatesTable.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/gmail-client-id
      Events:
        StartGoogleOAuthApi:
          Type: HttpApi
          Properties:
            Path: /auth/google/start
            Method: GET
            ApiId: !Ref GmailTranslatorHttpApi
            Auth:
              Authorizer: Auth0JwtAuthorizer
              AuthorizationScopes:
                - gmail:connect
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/startGoogleOAuth.ts
        External:
          - "@aws-sdk/*"

  GoogleOAuthCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ResourceNamePrefixParam}-google-oauth-callback
      CodeUri: ./
      Handler: googleOAuthCallback.handler
      Environment:
        Variables:
          APP_SECRETS_SSM_PREFIX: !Ref AppSecretsSsmPrefixParam
          GMAIL_CONNECTIONS_TABLE: !Ref GmailConnectionsTable
          GMAIL_CONNECTIONS_STATUS_INDEX: gsi1
          GMAIL_TOKEN_KMS_KEY_ID: !Ref GmailRefreshTokenKey
          GMAIL_CONNECTION_SUCCESS_REDIRECT_URL: !Ref GmailConnectionSuccessRedirectUrlParam
          GMAIL_CONNECTION_FAILURE_REDIRECT_URL: !Ref GmailConnectionFailureRedirectUrlParam
          GOOGLE_OAUTH_STATES_TABLE: !Ref GoogleOAuthStatesTable
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DeleteItem
              Resource: !GetAtt GoogleOAuthStatesTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt GmailConnectionsTable.Arn
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/gmail-client-id
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${AppSecretsSsmPrefixParam}/gmail-client-secret
            - Effect: Allow
              Action:
                - kms:Encrypt
              Resource: !GetAtt GmailRefreshTokenKey.Arn
      Events:
        GoogleOAuthCallbackApi:
          Type: HttpApi
          Properties:
            Path: /auth/google/callback
            Method: GET
            ApiId: !Ref GmailTranslatorHttpApi
            Auth:
              Authorizer: NONE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/googleOAuthCallback.ts
        External:
          - "@aws-sdk/*"

  DisconnectGoogleOAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ${ResourceNamePrefixParam}-disconnect-google-oauth
      CodeUri: ./
      Handler: disconnectGoogleOAuth.handler
      Environment:
        Variables:
          GMAIL_CONNECTIONS_TABLE: !Ref GmailConnectionsTable
          GMAIL_CONNECTIONS_STATUS_INDEX: gsi1
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:UpdateItem
              Resource: !GetAtt GmailConnectionsTable.Arn
      Events:
        DisconnectGoogleOAuthApi:
          Type: HttpApi
          Properties:
            Path: /auth/google/disconnect
            Method: POST
            ApiId: !Ref GmailTranslatorHttpApi
            Auth:
              Authorizer: Auth0JwtAuthorizer
              AuthorizationScopes:
                - gmail:disconnect
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/disconnectGoogleOAuth.ts
        External:
          - "@aws-sdk/*"

Outputs:
  TranslatorFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt TranslatorFunction.Arn
  OAuthHttpApiBaseUrl:
    Description: Base URL for the OAuth HttpApi
    Value: !Sub https://${GmailTranslatorHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  GoogleOAuthCallbackUrl:
    Description: Deployed Google OAuth callback URL
    Value: !Sub https://${GmailTranslatorHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/auth/google/callback
  GmailConnectionsTableName:
    Description: DynamoDB table for per-user Gmail connections
    Value: !Ref GmailConnectionsTable
  GmailRefreshTokenKeyArn:
    Description: KMS key used to encrypt Gmail refresh tokens
    Value: !GetAtt GmailRefreshTokenKey.Arn
  GoogleOAuthStatesTableName:
    Description: DynamoDB table for Google OAuth state records
    Value: !Ref GoogleOAuthStatesTable
